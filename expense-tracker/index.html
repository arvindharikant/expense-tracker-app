    <script>
      // Prevent error (keep this)
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get: () => originalFetch,
          set: (val) => {
            console.warn('Ignored attempt to set window.fetch');
          }
        });
      } catch (e) {
        console.warn('Could not redefine window.fetch', e);
      }
    </script>
