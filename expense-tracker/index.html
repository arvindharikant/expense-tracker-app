<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Correct Title -->
    <title>Expense Tracker App</title>

    <!-- ✅ SEO Description -->
    <meta name="description" content="Track your income and expenses easily online" />

    <script>
      // Prevent error (keep this)
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get: () => originalFetch,
          set: (val) => {
            console.warn('Ignored attempt to set window.fetch');
          }
        });
      } catch (e) {
        console.warn('Could not redefine window.fetch', e);
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
